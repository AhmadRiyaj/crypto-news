# render.yaml

services:
  - type: web
    name: crypto-news
    env: node
    plan: free

    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
      npm run build

    startCommand: npm start

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        value: file:/opt/render/project/src/prisma/prod.db

      - key: CRYPTOPANIC_API_KEY
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: NEXT_PUBLIC_SITE_URL
        sync: false

      - key: NEXT_PUBLIC_SITE_NAME
        value: CryptoPulse

    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/prisma
      sizeGB: 1